# API Keys
api_keys:
  gemini: ${GEMINI_API_KEY}           # default / flash
  gemini_pro: ${GEMINI_PRO_API_KEY}   # separate key for Pro

# ┌──────────────────────────────────────────────────┐
# │  Provider types:                                 │
# │    gemini  → Gemini API (pay per token)          │
# │    ollama  → local Ollama (free, no API key)     │
# └──────────────────────────────────────────────────┘

models:
  gemini_flash_api:
    provider: gemini
    model: gemini-3.1-flash-lite-preview
    api_key: gemini             # uses api_keys.gemini
    max_tokens: 2048
    temperature: 0.7
    description: "Gemini Flash via API"
  gemini_pro_api:
    provider: gemini
    model: gemini-3.1-pro-preview
    api_key: gemini_pro         # uses api_keys.gemini_pro
    max_tokens: 4096
    temperature: 0.5
    description: "Gemini Pro via API"

  # ── Ollama models (FREE, local) ──
  ollama_gemma:
    provider: ollama
    model: gemma3:1b
    max_tokens: 2048
    temperature: 0.7
    description: "Gemma 3 1B via Ollama (local)"

# Classifier — cheap LLM call to detect intent + topic
classifier:
  provider: ollama              # "gemini" or "ollama"
  model: gemma3:1b              # small local model for fast classification
  base_url: http://localhost:11434

# Router settings
router:
  default_casual: gemini_flash_api
  default_deep: gemini_pro_api

# Memory settings
memory:
  recall_limit: 5
  chromadb:
    path: ./data/chromadb
    collection: companion
  ollama:
    base_url: http://localhost:11434
    embedding_model: nomic-embed-text
    extraction_model: qwen3:1.7b
  # When Ollama is not installed or unavailable, use Gemini for fact extraction
  extraction_fallback:
    model: gemini-2.5-flash-lite
    api_key: gemini
  declutter:
    model: gemini-3.1-flash-lite-preview   # Gemini model used by /declutter
    api_key: gemini                 # which api_keys entry to use

# Debug — log full LLM requests/responses (also toggled at runtime via /debug)
debug: false

# Gemini Live API — optional voice + text (real-time, native audio). When enabled,
# clients can request use_live on /chat to get streamed text and audio from Live
# instead of TTS. Requires a Live-capable model (e.g. gemini-2.0-flash-live).
live:
  enabled: false
  # Live-capable model (e.g. gemini-2.0-flash-live-preview-04-09 or gemini-2.5-flash native audio)
  model: gemini-2.0-flash-live-preview-04-09
  api_key: gemini   # uses api_keys.gemini

# Text-to-speech
tts:
  backend: gemini           # kokoro | elevenlabs | google | gemini
  speed: 1.1                # speech speed: 0.5 (slow) to 2.0 (fast)

  # ── Kokoro (local, no API key) ──
  voice: af_heart           # kokoro voice preset (see list below)
  lang: a                   # kokoro language: a = American, b = British
  # Voices:
  #   American Female: af_heart (best), af_bella, af_nicole, af_sarah,
  #                    af_sky, af_nova, af_alloy, af_aoede, af_kore,
  #                    af_jessica, af_river
  #   American Male:   am_adam, am_michael, am_fenrir, am_puck,
  #                    am_eric, am_liam, am_echo, am_onyx, am_santa
  #   British Female:  bf_emma, bf_isabella, bf_alice, bf_lily
  #   British Male:    bm_george, bm_lewis, bm_daniel, bm_fable

  # ── ElevenLabs (API) ──
  elevenlabs:
    api_key: ${ELEVENLABS_API_KEY}
    model: eleven_multilingual_v2
    voice_id: Rachel
    speed: 1.1                # ElevenLabs speech speed (0.5–2.0)

  # ── Google Cloud TTS (API) ──
  google:
    api_key: ${GOOGLE_TTS_API_KEY}
    language_code: en-US
    voice_name: en-US-Journey-F
    speed: 1.1                # Google TTS speaking rate (0.25–4.0)

  # ── Gemini 2.5 Flash TTS (API, reuses Gemini key) ──
  gemini_tts:
    api_key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash-preview-tts
    voice_name: Aoede
    speed: 1.1                # not natively supported — applied via post-processing
    # Global modifier appended to every emotion style prompt.
    # Example: "Keep a warm, natural cadence with clear articulation."
    emotion_style_global_modifier: "slightly faster"
    # Optional per-emotion prompt tuning for Gemini TTS.
    # Keys should match chat emotion tags:
    # neutral, happy, sad, excited, calm, serious, playful, empathetic, curious, annoyed
    emotion_style_prompts:
      neutral: "You are an assistant speaking in a clear, friendly, and helpful tone."
      happy: "You are an assistant speaking in a warm, upbeat, and cheerful tone."
      sad: "You are an assistant speaking softly with a gentle, somber tone."
      excited: "You are an assistant speaking with energetic enthusiasm and bright pacing."
      calm: "You are an assistant speaking calmly, steadily, and reassuringly."
      serious: "You are an assistant speaking in a measured, authoritative, and professional tone."
      playful: "You are an assistant speaking in a playful, lighthearted, and expressive tone."
      empathetic: "You are an assistant speaking with empathy, care, and emotional sensitivity."
      curious: "You are an assistant speaking with inquisitive curiosity and thoughtful emphasis."
      annoyed: "You are an assistant speaking with restrained irritation, keeping clarity and control."
    # Optional localized modifiers (Gemini preview markup tags).
    # Set a value to "" to disable a modifier for that emotion.
    emotion_markup_prefixes:
      neutral: ""
      happy: "[laughing] "
      sad: "[sigh] "
      excited: "[shouting] "
      calm: "[medium pause] "
      serious: "[short pause] "
      playful: "[laughing] "
      empathetic: "[medium pause] "
      curious: "[uhm] "
      annoyed: "[sarcasm] "
    # Voices: Zephyr, Puck, Charon, Kore, Fenrir, Leda, Orus, Aoede,
    #         Callirrhoe, Autonoe, Enceladus, Iapetus, Umbriel, Algieba,
    #         Despina, Erinome, Algenib, Rasalgethi, Laomedeia, Achernar,
    #         Alnilam, Schedar, Gacrux, Pulcherrima, Achird,
    #         Zubenelgenubi, Vindemiatrix, Sadachbia, Sadaltager, Sulafat

# UI settings
ui:
  title: "AI Companion"
  default_topic: general
